<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You Ready AI?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Landing / Menu Screen -->
        <div id="landing-screen" class="screen active">
            <h1>Are you ReadAI?</h1>

            <div class="player-setup">
                <div class="input-group">
                    <label for="playerName">Enter Your Name:</label>
                    <input type="text" id="playerName" placeholder="Player Name" value="Player 1">
                </div>

                <div class="input-group">
                    <label for="avatarUpload">Upload Face Picture (Optional):</label>
                    <input type="file" id="avatarUpload" accept="image/*">
                    <div id="avatarPreviewContainer">
                        <img id="avatarPreview" src="" alt="Avatar Preview" style="display: none;">
                    </div>
                </div>
            </div>

            <div class="mode-selection">
                <button id="btnCreatePvP" class="btn primary">Create PvP Game</button>

                <div class="join-group">
                    <input type="text" id="joinRoomCode" placeholder="Enter Room Code">
                    <button id="btnJoinPvP" class="btn">Join Game</button>
                </div>

                <button id="btnPvAI" class="btn secondary">Play vs AI</button>
            </div>

            <div id="lobby-message" class="message hidden"></div>
        </div>

        <!-- Lobby Screen -->
        <div id="lobby-screen" class="screen hidden">
            <h2>Game Lobby</h2>
            <div class="room-info">
                Room Code: <span id="displayRoomCode" class="highlight">---</span>
            </div>
            <p>Share this code with your opponent.</p>
            <div class="players-list">
                <p id="player1Status">Player 1: <span class="status waiting">Waiting...</span></p>
                <p id="player2Status">Player 2: <span class="status waiting">Waiting...</span></p>
            </div>
            <button id="btnReady" class="btn primary" disabled>I'm Ready!</button>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen hidden">
            <div id="game-ui">
                <div class="top-bar">
                    <div class="player-info p1-info">
                        <div>
                            <span id="p1-name-ui">Player 1</span>
                            <div class="score">Score: <span id="p1-score">0</span></div>
                            <div class="shots">Shots: <span id="p1-shots">3</span></div>
                        </div>
                    </div>

                    <div class="center-info">
                        <div id="level-display">Level 1</div>
                        <div id="timer-display">10</div>
                    </div>

                    <div class="player-info p2-info">
                        <div>
                            <span id="p2-name-ui">Player 2</span>
                            <div class="score">Score: <span id="p2-score">0</span></div>
                            <div class="shots">Shots: <span id="p2-shots">3</span></div>
                        </div>
                    </div>
                </div>

                <div id="question-container">
                    <div id="question-text">Question loading...</div>
                </div>
            </div>

            <canvas id="gameCanvas" width="1200" height="600"></canvas>

            <div id="power-bar-container">
                <div id="power-bar-fill"></div>
            </div>

            <button id="btnQuitGameMid" class="btn secondary mid-quit">Quit Game</button>
        </div>

        <!-- Game Over Screen -->
        <div id="game-over-screen" class="screen hidden">
            <h1>Game Over!</h1>
            <h2 id="winner-announcement">Player 1 Wins!</h2>
            <div class="final-scores">
                <p>Player 1: <span id="final-p1-score">0</span></p>
                <p>Player 2: <span id="final-p2-score">0</span></p>
            </div>
            <div class="post-game-actions">
                <button id="btnRestart" class="btn primary">Play Again</button>
                <button id="btnQuit" class="btn secondary">Main Menu</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="game.js"></script>
</body>
</html>
